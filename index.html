<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>осеменить ❤️ салют</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0b0b1a 0%, #03030a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            cursor: default;
            user-select: none;
        }
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            background: rgba(10, 10, 25, 0.3);
            backdrop-filter: blur(3px);
            padding: 2rem 3rem;
            border-radius: 4rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s ease;
        }
        .main-text {
            font-size: 3.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #f0f0ff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.5), 0 0 30px rgba(200, 180, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .heart-btn {
            background: none;
            border: none;
            font-size: 4.2rem;
            line-height: 1;
            cursor: pointer;
            padding: 0 0.2rem;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 8px rgba(255, 80, 120, 0.6));
            color: #ff3b6f;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .heart-btn:hover {
            transform: scale(1.2);
        }
        .heart-btn:active {
            transform: scale(1.5);
            filter: drop-shadow(0 0 20px #ff8aa1);
        }
        .sub-hint {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            margin-top: 0.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 0.8rem;
            width: 100%;
            text-align: center;
        }
        /* контейнер для салюта и капель (поверх всего) */
        #fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px 4px rgba(255, 255, 255, 0.8);
            animation: sparkBurst 1.2s cubic-bezier(0, 0.7, 0.3, 1) forwards;
            pointer-events: none;
        }
        /* Капли (остаются после салюта) */
        .droplet {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(45deg);
            box-shadow: 0 0 15px 2px rgba(255, 255, 255, 0.6);
            opacity: 0.9;
            animation: dropletFall 1.8s ease-out forwards;
            pointer-events: none;
            filter: blur(0.4px);
        }
        @keyframes sparkBurst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
        @keyframes dropletFall {
            0% {
                opacity: 1;
                transform: translate(0, 0) rotate(45deg) scale(1);
            }
            30% {
                opacity: 1;
                transform: translate(var(--dx), calc(var(--dy) * 0.5)) rotate(45deg) scale(1.1);
            }
            100% {
                opacity: 0.7;
                transform: translate(var(--dx), var(--dy)) rotate(45deg) scale(0.7);
            }
        }
        /* адаптив */
        @media (max-width: 600px) {
            .main-text {
                font-size: 2.6rem;
                gap: 0.3rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .heart-btn {
                font-size: 3.2rem;
            }
            .container {
                padding: 1.5rem 1.8rem;
                border-radius: 2.5rem;
            }
        }
        @media (max-width: 400px) {
            .main-text {
                font-size: 2rem;
            }
            .heart-btn {
                font-size: 2.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-text">
            <span>осеменить</span>
            <button class="heart-btn" id="heartTrigger" aria-label="осеменить с любовью">❤️</button>
        </div>
        <div class="sub-hint">✦ нажми на сердце ✦</div>
    </div>

    <div id="fireworks-container"></div>

    <script>
        (function() {
            const container = document.getElementById('fireworks-container');
            const heartBtn = document.getElementById('heartTrigger');

            // Генерация случайного числа в диапазоне
            const rand = (min, max) => Math.random() * (max - min) + min;

            // Создаём частицу салюта (искра)
            function createSpark(x, y, angle, speed, size = 6) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                const rad = angle * (Math.PI / 180);
                const vx = Math.cos(rad) * speed;
                const vy = Math.sin(rad) * speed;
                // Устанавливаем случайный размер
                const s = size * (0.6 + Math.random() * 0.8);
                spark.style.width = s + 'px';
                spark.style.height = s + 'px';
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';
                spark.style.setProperty('--tx', vx + 'px');
                spark.style.setProperty('--ty', vy + 'px');
                // лёгкая вариация цвета (белый с оттенком)
                const whiteShade = 250 + Math.floor(Math.random() * 5);
                spark.style.background = `rgb(${whiteShade}, ${whiteShade}, 255)`;
                spark.style.boxShadow = `0 0 ${10 + Math.random() * 25}px 4px rgba(255,255,255,0.9)`;
                // случайная задержка для эффекта объёма
                spark.style.animationDelay = (Math.random() * 0.05) + 's';
                return spark;
            }

            // Создаём каплю (остаётся после салюта)
            function createDroplet(x, y, angle, distance, size = 7) {
                const droplet = document.createElement('div');
                droplet.className = 'droplet';
                const rad = angle * (Math.PI / 180);
                const dx = Math.cos(rad) * distance * (0.5 + Math.random() * 0.6);
                const dy = Math.sin(rad) * distance * (0.5 + Math.random() * 0.6) + 20; // небольшой наклон вниз
                const s = size * (0.5 + Math.random() * 0.8);
                droplet.style.width = s + 'px';
                droplet.style.height = s + 'px';
                droplet.style.left = x + 'px';
                droplet.style.top = y + 'px';
                droplet.style.setProperty('--dx', dx + 'px');
                droplet.style.setProperty('--dy', dy + 'px');
                // разные оттенки белого
                const bright = 230 + Math.floor(Math.random() * 25);
                droplet.style.background = `rgb(${bright}, ${bright}, 255)`;
                droplet.style.boxShadow = `0 0 12px 2px rgba(255,255,255,0.7)`;
                droplet.style.animationDuration = (1.5 + Math.random() * 1.2) + 's';
                return droplet;
            }

            // Основной взрыв (салют) из точки (x,y) с заданным количеством лучей
            function burstFirework(x, y, count = 140, spread = 360) {
                // 1. Искры (салют)
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * spread; // 0-360 градусов
                    const speed = rand(80, 300); // пикселей в секунду (анимация)
                    const size = rand(3, 9);
                    const spark = createSpark(x, y, angle, speed, size);
                    container.appendChild(spark);
                }

                // 2. Капли (белые, остаются на экране) — примерно 50% от числа искр
                const dropletCount = Math.floor(count * 0.5) + 15;
                for (let i = 0; i < dropletCount; i++) {
                    const angle = Math.random() * 360;
                    const distance = rand(50, 200);
                    const size = rand(5, 13);
                    const droplet = createDroplet(x, y, angle, distance, size);
                    container.appendChild(droplet);
                }

                // Чистим искры через 2 секунды (салют исчезает), капли остаются
                setTimeout(() => {
                    const sparks = container.querySelectorAll('.spark');
                    sparks.forEach(sp => sp.remove());
                }, 1600);

                // Дополнительно: удаляем слишком старые капли, чтобы не накапливать тысячи (оптимизация)
                // Удаляем капли старше 8 секунд (примерно)
                setTimeout(() => {
                    const droplets = container.querySelectorAll('.droplet');
                    if (droplets.length > 300) {
                        // удаляем половину старых (первые в списке)
                        const toRemove = Math.floor(droplets.length * 0.3);
                        for (let i = 0; i < toRemove && i < droplets.length; i++) {
                            if (droplets[i]) droplets[i].remove();
                        }
                    }
                }, 5000);
            }

            // Обработчик клика по сердечку
            function handleHeartClick(e) {
                // Получаем координаты клика (центр сердечка или точка касания)
                let x, y;
                if (e.touches) {
                    // touch событие
                    const touch = e.touches[0];
                    x = touch.clientX;
                    y = touch.clientY;
                    e.preventDefault(); // предотвращаем скролл
                } else {
                    // mouse событие
                    x = e.clientX;
                    y = e.clientY;
                }

                // Если координаты не определены (например, клик по кнопке) — берём центр экрана
                if (x === undefined || y === undefined) {
                    const rect = heartBtn.getBoundingClientRect();
                    x = rect.left + rect.width / 2;
                    y = rect.top + rect.height / 2;
                }

                // Добавляем небольшое случайное смещение для разнообразия
                const offsetX = (Math.random() - 0.5) * 30;
                const offsetY = (Math.random() - 0.5) * 30;
                const cx = x + offsetX;
                const cy = y + offsetY;

                // Запускаем салют с каплями
                burstFirework(cx, cy, 140, 360);
                // Небольшой дополнительный залп для красоты (меньше)
                setTimeout(() => {
                    const x2 = cx + (Math.random() - 0.5) * 80;
                    const y2 = cy + (Math.random() - 0.5) * 80;
                    burstFirework(x2, y2, 50, 300);
                }, 120);

                // Добавляем вибрацию (если поддерживается)
                if (navigator.vibrate) {
                    navigator.vibrate(10);
                }

                // Небольшой эффект "вспышки" на кнопке
                heartBtn.style.transform = 'scale(1.7)';
                heartBtn.style.filter = 'drop-shadow(0 0 40px #ff88aa)';
                setTimeout(() => {
                    heartBtn.style.transform = '';
                    heartBtn.style.filter = '';
                }, 200);
            }

            // Вешаем обработчики на сердечко
            heartBtn.addEventListener('click', handleHeartClick);
            heartBtn.addEventListener('touchstart', function(e) {
                // чтобы не дублировать клик на мобильных
                handleHeartClick(e);
                e.preventDefault();
            }, { passive: false });

            // Также запускаем салют при двойном клике по фону (для демонстрации, но не обязательно)
            // Можно активировать по кнопке

            // Небольшой стартовый салют через 1 секунду после загрузки (для приветствия)
            setTimeout(() => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                const cx = w * 0.3 + Math.random() * w * 0.4;
                const cy = h * 0.2 + Math.random() * h * 0.4;
                burstFirework(cx, cy, 80, 320);
            }, 700);

            // Чистка контейнера от старых капель раз в 15 секунд (чтобы не перегружать)
            setInterval(() => {
                const droplets = container.querySelectorAll('.droplet');
                if (droplets.length > 400) {
                    const toRemove = Math.floor(droplets.length * 0.2);
                    for (let i = 0; i < toRemove && i < droplets.length; i++) {
                        if (droplets[i]) droplets[i].remove();
                    }
                }
            }, 15000);

        })();
    </script>
</body>
</html>
